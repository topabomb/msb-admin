<div class="modal-overlay">
  <div class="modal" style="max-width: 800px;">
    <div class="modal-header">
      <h2>Create Sandbox</h2>
      <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove();document.body.style.overflow=''">✕</button>
    </div>
    <form hx-post="/sandboxes/create" hx-target="#sandbox-list" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful){setTimeout(()=>{document.querySelector('.modal-overlay')?.remove();document.body.style.overflow=''},500)}">
      <div class="modal-body" style="max-height:65vh;overflow-y:auto;">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" name="name" required placeholder="my-sandbox">
        </div>
        <div class="form-group">
          <label>Image *</label>
          <input type="text" name="image" required value="alpine" placeholder="alpine, python:3.12, ubuntu">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>CPUs</label>
            <input type="number" name="cpus" value="1" min="1" max="64">
          </div>
          <div class="form-group">
            <label>Memory (MiB)</label>
            <input type="number" name="memory" value="512" min="128" max="65536">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Idle Timeout (s)</label>
            <input type="number" name="idle_timeout" value="300" min="0" placeholder="300">
          </div>
          <div class="form-group">
            <label>Max Duration (s)</label>
            <input type="number" name="max_duration" value="0" min="0" placeholder="0 = unlimited">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Workdir</label>
            <input type="text" name="workdir" placeholder="/ (root)">
          </div>
          <div class="form-group">
            <label>Shell</label>
            <input type="text" name="shell" placeholder="/bin/sh">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>User</label>
            <input type="text" name="user" placeholder="root">
          </div>
          <div class="form-group">
            <label>Hostname</label>
            <input type="text" name="hostname" placeholder="(auto)">
          </div>
        </div>
        <div class="form-group">
          <label>Ports (host:guest, comma-separated)</label>
          <input type="text" name="ports" placeholder="8080:80, 443:443">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Security</label>
            <select name="security">
              <option value="default">default</option>
              <option value="restricted">restricted</option>
            </select>
          </div>
          <div class="form-group">
            <label>Network Policy</label>
            <select name="network_policy">
              <option value="">default (public_only)</option>
              <option value="none">none (airgapped)</option>
              <option value="allow_all">allow_all</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Pull Policy</label>
            <select name="pull_policy">
              <option value="">default (if-missing)</option>
              <option value="always">always</option>
              <option value="never">never</option>
            </select>
          </div>
          <div class="form-group">
            <label>Log Level</label>
            <select name="log_level">
              <option value="">default</option>
              <option value="trace">trace</option>
              <option value="debug">debug</option>
              <option value="info">info</option>
              <option value="warn">warn</option>
              <option value="error">error</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Environment Variables (JSON)</label>
          <input type="text" name="env_json" placeholder='{"KEY": "value", "FOO": "bar"}'>
        </div>
        <div class="form-group">
          <label>Volume Mounts (comma-separated volume names)</label>
          <input type="text" name="volumes" placeholder="my-vol, data-vol">
          {% if volumes %}
          <div style="font-size:11px;color:#666;margin-top:4px;">Available volumes:
          {% for v in volumes %}<code style="font-size:10px;">{{ v.name }}</code> {% endfor %}
          </div>
          {% endif %}
        </div>
        <div class="form-group">
          <label>Patches (JSON) — rootfs modifications before boot</label>
          <textarea name="patches_json" rows="2" style="width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:monospace;" placeholder='[{"kind":"text","path":"/etc/hello.txt","content":"hello\n"},{"kind":"mkdir","path":"/app"}]'></textarea>
        </div>
        <div class="form-group">
          <label>Scripts (JSON) — mounted at /.msb/scripts/</label>
          <textarea name="scripts_json" rows="2" style="width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:monospace;" placeholder='{"setup":"#!/bin/sh\necho setup","start":"#!/bin/sh\necho start"}'></textarea>
        </div>
        <div class="form-group">
          <label>Secrets (JSON) — credential injection</label>
          <textarea name="secrets_json" rows="2" style="width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:monospace;" placeholder='[{"env_var":"API_KEY","value":"sk-xxx","allow_hosts":["api.example.com"]}]'></textarea>
        </div>
        <div class="form-group">
          <label>Init Config (JSON) — custom init system</label>
          <textarea name="init_json" rows="2" style="width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:monospace;" placeholder='{"cmd":"/lib/systemd/systemd","args":["--unit=multi-user.target"],"env":{"container":"microsandbox"}}'></textarea>
        </div>
        <details style="margin-top:8px;">
          <summary style="cursor:pointer;font-size:12px;font-weight:600;">Registry Auth</summary>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <div class="form-group" style="flex:1;">
              <label>Username</label>
              <input type="text" name="registry_username" placeholder="registry username">
            </div>
            <div class="form-group" style="flex:1;">
              <label>Password</label>
              <input type="password" name="registry_password" placeholder="registry password">
            </div>
          </div>
        </details>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="this.closest('.modal-overlay').remove();document.body.style.overflow=''">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>
